name: Reverb Arbitrage Scanner

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Safety net — must finish before next run

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore seen_listings.json from cache so we don't re-alert on old listings
      - name: Restore seen listings cache
        uses: actions/cache@v4
        with:
          path: bot/seen_listings.json
          key: seen-listings-${{ github.run_id }}
          restore-keys: |
            seen-listings-

      - name: Run scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          cd bot
          python scanner.py

      # Save updated seen_listings.json back to cache
      - name: Save seen listings cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: bot/seen_listings.json
          key: seen-listings-${{ github.run_id }}
